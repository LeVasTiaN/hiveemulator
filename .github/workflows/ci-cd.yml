name: CI/CD Pipeline

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/levastian/hiveemulator/communication-control
  CLIENT_IMAGE: ghcr.io/levastian/hiveemulator/map-client

jobs:
  build:
    name: build_job
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0"

      - name: Build API
        run: |
          cd src/CommunicationControl
          dotnet publish -c Release -o ./published DevOpsProject/DevOpsProject.CommunicationControl.API.csproj

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build Frontend
        run: |
          cd src/MapClient
          npm ci
          npm run build

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-published
          path: src/CommunicationControl/published

      - name: Upload Frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: src/MapClient/dist

  docker:
    name: docker_job
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: api-published
          path: src/CommunicationControl/published

      - name: Download Frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: src/MapClient/dist

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        run: |
          docker build --platform linux/amd64 \
            -t ${{ env.API_IMAGE }}:latest \
            -f src/CommunicationControl/DevOpsProject/Dockerfile \
            src/CommunicationControl
          docker push ${{ env.API_IMAGE }}:latest

      - name: Build and push Frontend image
        run: |
          docker build --platform linux/amd64 \
            -t ${{ env.CLIENT_IMAGE }}:latest \
            -f src/MapClient/Dockerfile \
            src/MapClient
          docker push ${{ env.CLIENT_IMAGE }}:latest

  deploy:
    name: deploy_job
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to EC2
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
        run: |
          echo "$SSH_PRIVATE_KEY" > key.pem
          chmod 600 key.pem

          scp -o StrictHostKeyChecking=no -i key.pem \
            docker-compose.yaml ${SERVER_USER}@${SERVER_IP}:~/docker-compose.yaml

          ssh -o StrictHostKeyChecking=no -i key.pem ${SERVER_USER}@${SERVER_IP} \
            "sudo docker stop com-control map-client redis 2>/dev/null || true && \
             sudo docker rm com-control map-client redis 2>/dev/null || true && \
             sudo docker system prune -af && \
             echo ${GH_TOKEN} | sudo docker login ghcr.io -u ${GH_ACTOR} --password-stdin && \
             sudo docker compose -f ~/docker-compose.yaml pull && \
             sudo docker compose -f ~/docker-compose.yaml up -d"

          rm -f key.pem
