version: "3.9"
services:
  redis:
    image: redis:7
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - backend

  communication-control:
    image: ghcr.io/levastian/hiveemulator/communication-control:latest
    container_name: com-control
    restart: always
    environment:
      Redis__ConnectionString: "redis:6379"
    ports:
      - "8080:8080"
    networks:
      - backend
    depends_on:
      - redis

  map-client:
    image: ghcr.io/levastian/hiveemulator/map-client:latest
    container_name: map-client
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./config.json:/usr/share/nginx/html/config.json:ro
    networks:
      - backend
    depends_on:
      - communication-control

networks:
  backend:
